name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: ⚙️ Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: 📦 Install dependencies
        run: npm ci
        
      - name: 🏗️ Build Static Site
        run: npm run build
        
      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Path where Hostinger expects your public files (e.g., /public_html or /domains/yourdomain.com/public_html)
          server-dir: /public_html/
          # Path to the exported Next.js static files
          local-dir: ./frontend/out/
          dangerous-clean-slate: false # Set to true ONLY if you want the action to delete files on the server that don't exist locally
